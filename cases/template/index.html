<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Étude de cas — Axel Dadure</title>
  <meta name="description" content="" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/noise.css" />
  <link rel="stylesheet" href="../../css/cursor-glow.css" />
  <link rel="stylesheet" href="../../css/case.css" />
</head>
<body class="page" data-manual-ready>

  <!-- NAV — fixed, outside any container -->
  <nav class="nav" aria-label="Principale">
    <div class="container">
      <a href="../../index.html" class="nav__brand">
        <svg class="nav__brand-mark" width="24" height="16" viewBox="0 0 24 16" fill="none" aria-hidden="true">
          <rect y="8" width="8" height="8" rx="2" fill="var(--color-accent)"/>
          <rect x="8" width="8" height="8" rx="2" fill="var(--color-accent)"/>
          <rect x="16" y="8" width="8" height="8" rx="2" fill="var(--color-accent)"/>
        </svg>
        <span>Axel Dadure</span>
      </a>
      <div class="nav__right">
        <div class="nav__links">
          <a class="nav__link" href="../../work.html">Projets</a>
          <a class="nav__link" href="../../about.html">A propos</a>
        </div>
      </div>
    </div>
  </nav>

  <!--
    SITE HEADER — cover image fills this zone.
    noise + cursor grid effect layer on top of the image.
    #case-cover is outside .container so the image is full-viewport-width.
    Parser injects <img class="case__header-img"> here.
  -->
  <header class="site-header site-header--case noise" data-cursor-zone>
    <div class="container">
      <div id="case-cover"></div>
    </div>
  </header>

  <!-- MAIN CONTENT — case info + all [block] groups -->
  <main>
    <div class="container">
      <div class="frame frame--case">
        <div id="case-hero"></div>
        <div id="case-content" data-src="content.md" style="display:contents"></div>
      </div>
    </div>
  </main>

  <script src="../../js/cursor-glow.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/case-parser.js"></script>
  <script src="../../js/lightbox.js"></script>
</body>
</html>
